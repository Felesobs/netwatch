services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: netwatch
      POSTGRES_PASSWORD: netwatch
      POSTGRES_DB: netwatch
    volumes:
      - netwatch_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netwatch -d netwatch"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  netwatch_pgdata:
